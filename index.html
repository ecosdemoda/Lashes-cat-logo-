<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lashes Lashes - Salón de Belleza</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            blush: '#FFF0F5', charcoal: '#1A1A1A', fuchsia: '#D6336C', sand: '#FCE4EC', drift: '#6B7280', admin: '#111827', adminCard: '#1F2937'
          },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['Lato', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --bg: #FFF0F5; --fg: #1A1A1A; --accent: #D6336C; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--fg); overflow-x: hidden; max-width: 100vw; }
    .font-display { font-family: 'Playfair Display', serif; }
    .service-card { transition: transform 0.2s; border-radius: 16px; overflow: hidden; background: #fff; }
    .service-card:active { transform: scale(0.97); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,240,245,0.97); backdrop-filter: blur(12px); border-top: 1px solid #fce4ec; z-index: 900; padding-bottom: env(safe-area-inset-bottom, 0px); display: flex; }
    .bottom-nav button { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: #6B7280; transition: color 0.2s; padding: 10px 0; background: none; border: none; cursor: pointer; flex: 1; }
    .bottom-nav button.active { color: #D6336C; font-weight: 700; }
    .bottom-nav button i { font-size: 20px; }
    .modal-overlay { position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal-box { transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); width: 100%; max-height: 95vh; overflow-y: auto; border-radius: 24px 24px 0 0; background: #fff; }
    .modal-overlay.visible .modal-box { transform: translateY(0); }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120%); background: #1A1A1A; color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 2000; transition: transform 0.4s; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .admin-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid #374151; font-size: 15px; font-family: 'Lato', sans-serif; background: #1F2937; color: #f9fafb; }
    .admin-input:focus { outline: none; border-color: #D6336C; }
    .badge { position: absolute; top: -5px; right: -5px; background: #D6336C; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .tabs-scroll { overflow-x: auto; scrollbar-width: none; } .tabs-scroll::-webkit-scrollbar { display: none; }
    
    /* Estilos Galería Collage */
    #galleryGrid { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 130px; gap: 6px; }
    #galleryGrid .gallery-item:nth-child(1) { grid-column: span 2; grid-row: span 2; }
    #galleryGrid .gallery-item { position: relative; border-radius: 12px; overflow: hidden; }
    #galleryGrid .gallery-item img, #galleryGrid .gallery-item video { width: 100%; height: 100%; object-fit: cover; }
    #galleryGrid .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); color: white; font-size: 24px; pointer-events: none; }
    
    /* Categorías */
    .cat-btn { transition: all 0.2s; border: 2px solid transparent; }
    .cat-btn.active { background: white; border-color: var(--accent); color: var(--accent); box-shadow: 0 4px 12px rgba(214, 51, 108, 0.15); }
  </style>
</head>
<body>

  <nav class="bottom-nav">
    <button class="active" onclick="switchScreen('home')" id="navHome"><i class="fas fa-spa"></i><span>Inicio</span></button>
    <button onclick="switchScreen('booking')" id="navBooking" class="relative"><i class="fas fa-calendar-check"></i><span id="bookingBadge" class="badge hidden">0</span><span>Turno</span></button>
    <button onclick="handleAdminClick()" id="navAdmin"><i class="fas fa-lock"></i><span>Admin</span></button>
  </nav>

  <main id="screenHome" class="pb-24">
    <div class="relative overflow-hidden bg-charcoal flex flex-col items-center justify-center p-6 pt-10 pb-8">
      <img id="heroLogo" src="https://raw.githubusercontent.com/ecosdemoda/Lashes-cat-logo-/main/Logo%20lashes.png" alt="Lashes Lashes Logo" class="w-36 h-36 object-contain rounded-full shadow-lg border-4 border-white/10 mb-4 bg-white/10 p-1">
      <h1 id="salonTitle" class="font-display text-3xl font-black text-white leading-tight text-center drop-shadow-md"></h1>
      <div class="flex items-center gap-2 text-white/80 text-sm mt-2 drop-shadow-sm"><i class="fas fa-map-marker-alt"></i><span id="salonAddress"></span></div>
    </div>

    <section class="px-4 py-6">
      <h2 class="font-display text-2xl font-bold mb-4">Servicios</h2>
      
      <!-- Tabs de Categorías -->
      <div class="flex gap-2 overflow-x-auto pb-3 tabs-scroll mb-4">
        <button onclick="filterCategory('pestanas')" class="cat-btn active flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold bg-sand text-charcoal shrink-0" data-cat="pestanas">
          <i class="fas fa-eye"></i> Pestañas y Cejas
        </button>
        <button onclick="filterCategory('unas')" class="cat-btn flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold bg-sand text-charcoal shrink-0" data-cat="unas">
          <i class="fas fa-hand-sparkles"></i> Uñas
        </button>
        <button onclick="filterCategory('faciales')" class="cat-btn flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold bg-sand text-charcoal shrink-0" data-cat="faciales">
          <i class="fas fa-face-smile-beam"></i> Faciales
        </button>
      </div>

      <div id="servicesGrid" class="grid grid-cols-2 gap-3"></div>
    </section>

    <!-- Sección Galería / Portafolio -->
    <section class="px-4 py-6">
      <h2 class="font-display text-2xl font-bold mb-4">Nuestros Trabajos</h2>
      <div id="galleryGrid"></div>
      <div id="galleryEmpty" class="text-center py-8 hidden">
        <i class="fas fa-camera-retro text-3xl text-sand mb-2"></i>
        <p class="text-drift text-sm">Pronto subiremos nuestros mejores trabajos</p>
      </div>
    </section>
  </main>

  <div id="screenBooking" class="pb-24 px-4 pt-6" style="display:none;">
    <h2 class="font-display text-2xl font-bold mb-4">Reservar Turno</h2>
    <div id="bookingEmpty" class="text-center py-12"><i class="fas fa-calendar-xmark text-4xl text-sand mb-3"></i><p class="text-drift text-sm">No has seleccionado servicios</p></div>
    <div id="bookingList" class="space-y-3 mb-6" style="display:none;"></div>
    <div id="bookingForm" class="space-y-3 border-t border-sand pt-4" style="display:none;">
      <div id="bookingTotal" class="text-right font-bold text-xl mb-2"></div>
      <input type="text" id="bookName" placeholder="Tu nombre completo" class="admin-input border-sand bg-white text-charcoal">
      <input type="tel" id="bookPhone" placeholder="Tu teléfono" class="admin-input border-sand bg-white text-charcoal">
      <input type="text" id="bookMunicipality" placeholder="Municipio / Dirección" class="admin-input border-sand bg-white text-charcoal">
      <select id="bookTime" class="admin-input border-sand bg-white text-charcoal"><option value="">Selecciona el horario</option></select>
      <button onclick="sendBooking()" class="w-full py-3 rounded-xl font-bold text-white text-base bg-green-600 active:scale-95 transition flex items-center justify-center gap-2"><i class="fab fa-whatsapp text-xl"></i> Reservar por WhatsApp</button>
    </div>
  </div>

  <div id="loginModal" class="modal-overlay"><div class="modal-box p-8 shadow-2xl"><h3 class="font-display text-xl font-bold mb-4 text-center">Acceso Admin</h3><div class="space-y-4"><input id="loginToken" type="password" class="admin-input border-sand bg-white text-charcoal" placeholder="Tu Token de GitHub (ghp_...)"><p id="loginError" class="text-red-500 text-sm hidden">Token incorrecto o sin permisos.</p><button type="button" onclick="handleLogin()" class="w-full py-3 rounded-xl font-bold text-white active:scale-95 transition" style="background:var(--accent)">Entrar</button><button type="button" onclick="closeAllModals()" class="w-full py-3 rounded-xl font-bold text-drift border border-sand">Cancelar</button></div></div></div>

  <div id="adminModal" class="modal-overlay"><div class="modal-box bg-admin text-white flex flex-col shadow-2xl" style="height:100vh;max-height:100vh;border-radius:0;">
    <header class="p-4 border-b border-gray-700 flex justify-between items-center shrink-0"><h2 class="font-display text-lg font-bold" style="color:var(--accent)">Admin Salón</h2><button onclick="closeAllModals()" class="text-xl"><i class="fas fa-times"></i></button></header>
    <div class="flex gap-1 p-3 border-b border-gray-700 shrink-0 bg-adminCard/50 overflow-x-auto tabs-scroll">
      <button onclick="showAdminPage('info')" class="admin-tab px-3 py-2 rounded-lg text-xs font-bold text-gray-300 shrink-0" data-page="info"><i class="fas fa-store mr-1"></i> Info</button>
      <button onclick="showAdminPage('services')" class="admin-tab px-3 py-2 rounded-lg text-xs font-bold text-gray-300 shrink-0" data-page="services"><i class="fas fa-wand-magic-sparkles mr-1"></i> Servicios</button>
      <button onclick="showAdminPage('gallery')" class="admin-tab px-3 py-2 rounded-lg text-xs font-bold text-gray-300 shrink-0" data-page="gallery"><i class="fas fa-images mr-1"></i> Galería</button>
    </div>
    <div id="adminContent" class="flex-1 overflow-y-auto p-5"></div>
    <footer class="p-3 border-t border-gray-700 shrink-0"><button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 py-3 rounded-xl hover:bg-red-900/30 text-red-400 font-bold"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button></footer>
  </div></div>

  <div id="toast" class="toast"></div>

  <script>
    const GITHUB_OWNER = 'ecosdemoda'; 
    const GITHUB_REPO = 'Lashes-cat-logo-';
    const GITHUB_BRANCH = 'main';
    const GITHUB_FILE_PATH = 'data.json';
    const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${GITHUB_FILE_PATH}`;
    const API_URL = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`;

    let storeData = {}, isLoggedIn = false, bookingCart = [], fileSha = '';
    let currentCategory = 'pestanas'; // Categoría inicial

    async function initApp() {
      try {
        const res = await fetch(RAW_URL + '?t=' + Date.now());
        if (res.ok) {
          const text = await res.text();
          if(text) storeData = JSON.parse(text);
        }
      } catch(e) { console.error(e); }
      
      if (Object.keys(storeData).length === 0) {
        const cache = localStorage.getItem('lashes_store_cache');
        if (cache) try { storeData = JSON.parse(cache); } catch(e) {}
      }

      if (!storeData.salonName) storeData.salonName = 'Lashes Lashes';
      if (!storeData.address) storeData.address = 'La elegancia comienza por tu mirada';
      if (!storeData.services) storeData.services = [];
      if (!storeData.gallery) storeData.gallery = [];
      
      renderHome(); generateTimeSlots(); renderGallery();
    }

    async function saveData() {
      try {
        const token = localStorage.getItem('gh_token_lashes'); if(!token) throw new Error("No Token");
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(storeData, null, 2))));
        const currentRes = await fetch(API_URL, { headers: { Authorization: `token ${token}` } });
        let sha = '';
        if (currentRes.status === 401) { showToast('Token sin permisos', 'error'); throw new Error("Bad Token"); }
        if (currentRes.ok) { sha = (await currentRes.json()).sha; } 
        const putRes = await fetch(API_URL, {
          method: 'PUT', headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Actualizar salón', content, sha: sha, branch: GITHUB_BRANCH })
        });
        if(!putRes.ok) throw new Error("Error guardar");
        fileSha = (await putRes.json()).content.sha;
        localStorage.setItem('lashes_store_cache', JSON.stringify(storeData));
        showToast('¡Guardado con éxito!', 'success');
      } catch(e) { showToast('Error al guardar en GitHub', 'error'); }
    }

    function initAuth() { isLoggedIn = !!localStorage.getItem('gh_token_lashes'); document.getElementById('navAdmin').querySelector('i').className = isLoggedIn ? 'fas fa-unlock' : 'fas fa-lock'; }
    async function handleLogin() { 
      const t = document.getElementById('loginToken').value.trim(); if(!t) return;
      try {
        const r = await fetch(API_URL, {headers: {Authorization: `token ${t}`}});
        if(r.ok){ localStorage.setItem('gh_token_lashes', t); isLoggedIn=true; fileSha=(await r.json()).sha; closeAllModals(); openAdmin(); initAuth(); }
        else document.getElementById('loginError').classList.remove('hidden');
      } catch(e) { document.getElementById('loginError').classList.remove('hidden'); }
    }
    function handleLogout() { localStorage.removeItem('gh_token_lashes'); isLoggedIn=false; initAuth(); closeAllModals(); }

    function renderHome() {
      document.getElementById('salonTitle').textContent = storeData.salonName;
      document.getElementById('salonAddress').textContent = storeData.address;
      if(storeData.heroImage) document.getElementById('heroLogo').src = storeData.heroImage;
      renderServices(); // Llama a la nueva función
    }

    function filterCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      renderServices();
    }

    function renderServices() {
      const g = document.getElementById('servicesGrid');
      const filtered = storeData.services.filter(s => s.category === currentCategory);
      
      if (filtered.length === 0) {
        g.innerHTML = `<div class="col-span-2 flex flex-col items-center justify-center py-12 text-center">
          <i class="fas fa-hourglass-half text-4xl text-sand mb-3"></i>
          <h3 class="font-display text-2xl font-bold text-fuchsia mb-2">Muy Pronto</h3>
          <p class="text-drift text-sm">Estamos preparando servicios increíbles para ti en esta categoría.</p>
        </div>`;
        return;
      }

      g.innerHTML = '';
      filtered.forEach(s => {
        g.innerHTML += `<div class="service-card shadow-md border border-sand/50 flex flex-col"><img src="${s.image}" class="w-full h-36 object-cover"><div class="p-3 flex-grow flex flex-col"><h3 class="font-display text-sm font-bold leading-tight mb-1">${s.name}</h3><p class="text-xs text-drift mb-2"><i class="far fa-clock mr-1"></i>${s.duration || '60 min'}</p><p class="text-sm font-bold mt-auto" style="color:var(--accent)">$${s.price}</p></div><button onclick="addService(${s.id})" class="w-full py-2 text-white text-xs font-bold active:scale-95 transition" style="background:var(--accent)"><i class="fas fa-plus mr-1"></i>Agregar</button></div>`;
      });
    }

    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      const empty = document.getElementById('galleryEmpty');
      if(!storeData.gallery || storeData.gallery.length === 0) {
        grid.innerHTML = ''; empty.classList.remove('hidden'); return;
      }
      empty.classList.add('hidden'); grid.innerHTML = '';
      storeData.gallery.forEach(item => {
        if(item.type === 'video') {
          grid.innerHTML += `<div class="gallery-item"><video src="${item.url}" autoplay loop muted playsinline></video><div class="play-icon"><i class="fas fa-play"></i></div></div>`;
        } else {
          grid.innerHTML += `<div class="gallery-item"><img src="${item.url}" alt="Trabajo realizado"></div>`;
        }
      });
    }

    function generateTimeSlots() {
      const sel = document.getElementById('bookTime');
      for(let h=9; h<18; h++) {
        const h12 = h > 12 ? h-12 : h; const ampm = h >= 12 ? 'PM' : 'AM';
        sel.innerHTML += `<option value="${h}:00">${h12}:00 ${ampm}</option>`;
        sel.innerHTML += `<option value="${h}:30">${h12}:30 ${ampm}</option>`;
      }
    }

    function addService(id) { const s = storeData.services.find(x => x.id === id); if(!s) return; const e = bookingCart.find(x => x.id === id); if(e) e.qty++; else bookingCart.push({id: s.id, name: s.name, price: s.price, qty: 1}); updateBookingBadge(); showToast('Servicio añadido', 'success'); }
    function removeService(id) { bookingCart = bookingCart.filter(x => x.id !== id); updateBookingBadge(); renderBooking(); }
    function updateBookingBadge() { const t = bookingCart.reduce((s,i)=>s+i.qty,0); const b = document.getElementById('bookingBadge'); if(t>0){b.textContent=t;b.classList.remove('hidden');}else b.classList.add('hidden'); }

    function renderBooking() {
      const list = document.getElementById('bookingList'), form = document.getElementById('bookingForm'), empty = document.getElementById('bookingEmpty');
      if(bookingCart.length===0){ list.style.display='none'; form.style.display='none'; empty.style.display='block'; return; }
      empty.style.display='none'; list.style.display='block'; form.style.display='block'; list.innerHTML=''; let total=0;
      bookingCart.forEach(i => { total+=i.price*i.qty; list.innerHTML += `<div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm"><div><h4 class="font-bold text-sm">${i.name}</h4><p class="text-xs" style="color:var(--accent)">$${i.price} x ${i.qty}</p></div><div class="flex items-center gap-2"><button onclick="removeService(${i.id})" class="text-red-400"><i class="fas fa-trash text-xs"></i></button></div></div>`; });
      document.getElementById('bookingTotal').innerHTML = `<span class="text-drift text-sm">Total:</span> <span style="color:var(--accent)">$${total}</span>`;
    }

    function sendBooking() {
      const name = document.getElementById('bookName').value.trim(), phone = document.getElementById('bookPhone').value.trim(), muni = document.getElementById('bookMunicipality').value.trim(), time = document.getElementById('bookTime').value;
      if(!name || !phone || !muni || !time) { showToast('Completa todo', 'error'); return; }
      let msg = `💅 *Reserva - ${storeData.salonName}*\n\n👤 *Cliente:* ${name}\n📞 *Teléfono:* ${phone}\n📍 *Dirección:* ${muni}\n🕒 *Horario:* ${time}\n\n📋 *Servicios:*\n`;
      let total = 0;
      bookingCart.forEach(i => { const sub = i.price * i.qty; total += sub; msg += `  • ${i.name} x${i.qty} - $${sub}\n`; });
      msg += `\n💰 *Total: $${total}*`;
      window.open(`https://wa.me/${(storeData.phone||'').replace(/[^0-9]/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
      bookingCart = []; updateBookingBadge(); renderBooking(); switchScreen('home');
    }

    function switchScreen(s) {
      document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));
      document.getElementById('screenHome').style.display = s==='home'?'block':'none';
      document.getElementById('screenBooking').style.display = s==='booking'?'block':'none';
      if(s==='home') document.getElementById('navHome').classList.add('active');
      if(s==='booking'){ document.getElementById('navBooking').classList.add('active'); renderBooking(); }
    }

    function handleAdminClick() { isLoggedIn ? openAdmin() : openModal('loginModal'); }
    function openAdmin() { openModal('adminModal'); showAdminPage('info'); }
    function openModal(id) { document.getElementById(id).classList.add('visible'); }
    function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('visible')); }
    let toastTimer; function showToast(m, t) { const e=document.getElementById('toast'); e.textContent=m; e.className='toast '+t; clearTimeout(toastTimer); setTimeout(()=>e.classList.add('show'),10); toastTimer=setTimeout(()=>e.classList.remove('show'),2500); }

    function showAdminPage(pg) {
      document.querySelectorAll('.admin-tab').forEach(b => { b.classList.toggle('bg-pink-900/30', b.dataset.page===pg); b.classList.toggle('text-pink-400', b.dataset.page===pg); b.classList.toggle('text-gray-300', b.dataset.page!==pg); });
      const c = document.getElementById('adminContent');
      if(pg==='info') renderAdminInfo(c); 
      else if(pg==='services') renderAdminServices(c); 
      else if(pg==='gallery') renderAdminGallery(c);
    }

    function renderAdminInfo(el) {
      el.innerHTML = `<div class="space-y-4"><h3 class="font-display font-bold text-pink-400">Información del Salón</h3><div><label class="block text-xs text-gray-400 mb-1">Nombre</label><input id="ai_name" value="${storeData.salonName||''}" class="admin-input"></div><div><label class="block text-xs text-gray-400 mb-1">Dirección / Slogan</label><input id="ai_addr" value="${storeData.address||''}" class="admin-input"></div><div><label class="block text-xs text-gray-400 mb-1">WhatsApp (solo números)</label><input id="ai_phone" value="${storeData.phone||''}" class="admin-input"></div><div><label class="block text-xs text-gray-400 mb-1">URL Imagen Logo (Raw URL)</label><input id="ai_img" value="${storeData.heroImage||''}" class="admin-input"></div><button onclick="saveAdminInfo()" class="w-full py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)">Guardar</button></div>`;
    }
    async function saveAdminInfo() { storeData.salonName=document.getElementById('ai_name').value; storeData.address=document.getElementById('ai_addr').value; storeData.phone=document.getElementById('ai_phone').value; storeData.heroImage=document.getElementById('ai_img').value; try{await saveData(); renderHome();}catch(e){} }

    function renderAdminServices(el) {
      let h = '<div class="space-y-3">';
      storeData.services.forEach((s,i) => { h += `<div class="bg-adminCard p-3 rounded-xl border border-gray-700 flex gap-3"><img src="${s.image}" class="w-16 h-16 rounded-lg object-cover"><div class="flex-1"><h4 class="font-bold text-sm">${s.name}</h4><p class="text-pink-400 text-xs">$${s.price} | ${s.duration} | Cat: ${s.category||'Sin cat'}</p></div><button onclick="deleteService(${i})" class="text-red-400 text-xs"><i class="fas fa-trash"></i></button></div>`; });
      h += `</div><button onclick="renderServiceForm()" class="w-full mt-4 py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)"><i class="fas fa-plus mr-1"></i> Nuevo Servicio</button>`;
      el.innerHTML = h;
    }
    
    function renderServiceForm() {
      document.getElementById('adminContent').innerHTML = `<button onclick="showAdminPage('services')" class="text-drift hover:text-white mb-4 inline-flex gap-2 text-sm"><i class="fas fa-arrow-left"></i> Volver</button><h3 class="font-display text-lg font-bold mb-4">Nuevo Servicio</h3><div class="space-y-3"><input id="sv_name" placeholder="Nombre" class="admin-input"><input id="sv_price" type="number" placeholder="Precio" class="admin-input"><input id="sv_dur" placeholder="Duración (Ej: 45 min)" class="admin-input"><select id="sv_cat" class="admin-input"><option value="pestanas">Pestañas y Cejas</option><option value="unas">Manicura y Pedicura</option><option value="faciales">Faciales</option></select><input id="sv_img" placeholder="URL de imagen (GitHub Raw)" class="admin-input"><button onclick="saveService()" class="w-full py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)">Guardar</button></div>`;
    }
    async function saveService() {
      const name=document.getElementById('sv_name').value, price=Number(document.getElementById('sv_price').value), duration=document.getElementById('sv_dur').value, image=document.getElementById('sv_img').value, category=document.getElementById('sv_cat').value;
      if(!name||!price) { showToast('Pon nombre y precio', 'error'); return; }
      storeData.services.push({id:Date.now(), name, price, duration: duration||'60 min', image: image||'https://picsum.photos/seed/s'+Date.now()+'/400/400', category});
      try{await saveData(); showAdminPage('services'); renderHome();}catch(e){}
    }
    async function deleteService(index) { if(!confirm('¿Eliminar?')) return; storeData.services.splice(index,1); try{await saveData(); showAdminPage('services'); renderHome();}catch(e){} }

    // ADMIN GALERÍA
    function renderAdminGallery(el) {
      let h = '<h3 class="font-display font-bold text-pink-400 mb-4">Galería de Trabajos</h3><div class="space-y-3">';
      if(storeData.gallery && storeData.gallery.length > 0) {
        storeData.gallery.forEach((item, i) => {
          h += `<div class="bg-adminCard p-2 rounded-xl border border-gray-700 flex gap-3 items-center">`;
          if(item.type === 'video') h += `<i class="fas fa-video text-pink-400 text-lg ml-2"></i>`;
          else h += `<img src="${item.url}" class="w-14 h-14 rounded-lg object-cover">`;
          h += `<div class="flex-1 text-xs text-gray-300 truncate">${item.url}</div><button onclick="deleteGalleryItem(${i})" class="text-red-400 text-xs p-2"><i class="fas fa-trash"></i></button></div>`;
        });
      }
      h += `</div><button onclick="renderGalleryForm()" class="w-full mt-4 py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)"><i class="fas fa-plus mr-1"></i> Agregar Foto/Video</button>`;
      el.innerHTML = h;
    }

    function renderGalleryForm() {
      document.getElementById('adminContent').innerHTML = `<button onclick="showAdminPage('gallery')" class="text-drift hover:text-white mb-4 inline-flex gap-2 text-sm"><i class="fas fa-arrow-left"></i> Volver</button><h3 class="font-display text-lg font-bold mb-4">Agregar a Galería</h3><div class="space-y-3"><input id="gal_url" placeholder="URL de la imagen o video (GitHub Raw)" class="admin-input"><select id="gal_type" class="admin-input"><option value="image">Imagen</option><option value="video">Video</option></select><button onclick="saveGalleryItem()" class="w-full py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)">Guardar</button></div>`;
    }

    async function saveGalleryItem() {
      const url = document.getElementById('gal_url').value.trim();
      const type = document.getElementById('gal_type').value;
      if(!url) { showToast('Pon la URL', 'error'); return; }
      if(!storeData.gallery) storeData.gallery = [];
      storeData.gallery.push({ id: Date.now(), url, type });
      try{ await saveData(); showAdminPage('gallery'); renderGallery(); }catch(e){}
    }

    async function deleteGalleryItem(index) { if(!confirm('¿Eliminar de la galería?')) return; storeData.gallery.splice(index,1); try{await saveData(); showAdminPage('gallery'); renderGallery();}catch(e){} }

    document.addEventListener('DOMContentLoaded', () => { initAuth(); initApp(); document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e) { if(e.target===o) closeAllModals(); })); });
  </script>
</body>
